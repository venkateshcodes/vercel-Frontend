<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sanskaram Conference 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B3D91 0%, #1a1a4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #1a1a4e;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0B3D91;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0B3D91, #1a1a4e);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }
        .auth-footer {
            margin-top: 20px;
            text-align: center;
        }
        .auth-footer a {
            color: #0B3D91;
            text-decoration: none;
            font-weight: 600;
        }
        .demo-box {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 12px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-university" style="font-size: 48px; color: #FFD700;"></i>
                <h2 style="margin-top: 10px;">Sanskaram Conference 2026</h2>
            </div>
            <h1>Welcome Back</h1>
            <p style="color: #666; margin-bottom: 30px;">Login to access your dashboard</p>

            <div id="alert" class="alert alert-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register Now</a></p>
            </div>

            <div class="demo-box">
                <strong><i class="fas fa-info-circle"></i> Demo Credentials:</strong><br>
                Register a new account to get started<br>
                <small>First user registered becomes admin</small>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";

        // Check if already logged in
        const token = localStorage.getItem("token");
        if (token) {
            // Verify token with backend
            fetch(`${API_URL}/auth/me`, {
                headers: { "Authorization": `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Already logged in, redirect
                    if (data.user.role === "admin") {
                        window.location.href = "admin/dashboard.html";
                    } else {
                        window.location.href = "user/dashboard.html";
                    }
                }
            })
            .catch(err => console.log("Not logged in or token expired"));
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const alertDiv = document.getElementById("alert");
            const submitBtn = document.getElementById("submitBtn");

            if (!email || !password) {
                showAlert("Please enter both email and password", "error");
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Logging in...';

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    
                    showAlert("Login successful! Redirecting...", "success");
                    
                    setTimeout(() => {
                        if (data.user.role === "admin") {
                            window.location.href = "admin/dashboard.html";
                        } else {
                            window.location.href = "user/dashboard.html";
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || "Login failed", "error");
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                console.error("Login error:", error);
                showAlert("Cannot connect to server. Please make sure the backend is running on http://localhost:5000", "error");
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.getElementById("alert");
            alertDiv.style.display = "block";
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i> ${message}`;
            setTimeout(() => {
                alertDiv.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
